version: "3"

tasks:
  test:
    desc: Run the test suite
    cmds:
      - uv run pytest

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check .

  check:
    desc: Lint then test
    cmds:
      - task: lint
      - task: test

  sync:
    desc: Download binaries for a release tag (e.g. task sync -- v0.1.0)
    cmds:
      - uv run python scripts/sync_binary.py {{.CLI_ARGS}}

  wheels:
    desc: Build platform-tagged wheels into dist/
    cmds:
      - uv run python scripts/build_wheels.py

  clean:
    desc: Remove dist/ and agent_runtime/bin/*
    cmds:
      - rm -rf dist/
      - rm -f agent_runtime/bin/*
